<body>

</video>

<div class="hero-contenido"></div>

</section>

<section id="convocatorias" class="convocatorias">

<h1>¿QUIERES SER PARTE DE NUESTRA SEXTA EDICIÓN?</h1>
<h2 class="subtitulo">Estamos buscando</h2>

<div class="conv-grid">


<div class="conv-item" onclick="abrirModal('recursos/music.png','recursos/convocatoria-musicos-emergentes.pdf')">

<img src="recursos/ante.png">

<button>Músicos emergentes</button>

</div>


<div class="conv-item" onclick="abrirModal('recursos/medios.png','recursos/medios.pdf')">

<img src="recursos/zor.png">

<button>Medios de difusión</button>

</div>


<div class="conv-item" onclick="abrirModal('recursos/emprendedores.png','recursos/emprendedores.pdf')">

<img src="recursos/hon.png">

<button>Emprendedores</button>

</div>


<div class="conv-item" onclick="abrirModal('recursos/artistas.png','recursos/artistas.pdf')">

<img src="recursos/art.png">

<button>Artistas visuales</button>

</div>


</div>

</section>

</div>

</footer>



<!-- ============================= -->

<!-- ============================= -->

<div id="modalConv" class="modal">

<div class="modal-content">

<img id="imagenModal">

<div class="modal-botones">

<a id="descargaArchivo" download>
<button>Descargar información</button>
</a>

<span class="cerrar" onclick="cerrarModal()">X</span>

</div>

</div>

</div>


<script src="js/script.js"></script>
